<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="login-form.css">
</head>
<body>
        <form>
        <div class="conatiner">
        <h1>RESERVE YOUR TABLE</h1>
        <div class="one-line-feild">
        <div class="field-group">
            <label for="first-name" class="name">First Name</label>
            <input type="text" name="first-name" class="name">
        </div>

        <div class="field-group">
            <label for="last-name" class="name">Last Name</label>
            <input type="text" name="last-name" class="name">
        </div>
        </div>

        <div class="field-group email-pass">
            <label for="email">E-mail</label>
            <input type="text" name="email" placeholder="Enter Your E-mail" required>
        </div>

        <div class="field-group email-pass">
            <label for="passward">Passward</label>
            <input type="text" name="passward" placeholder="Enter Your Passward" required>
        </div>
        
        <div class="second-one-line-feild"> 
        <div class="field-group">
            <label for="date">Date</label>
            <input type="date" name="date" id="" required>
        </div>

        <div class="field-group">
            <label for="time">Time</label>
            <input type="time" name="time" id="" required>
        </div>
        </div>
        
        <div class="guest-occassion">
        <div class="field-group guest">
            <label for="guest">Guest</label>
            <select name="guest" id="">
                <option value="1person">1 Person</option>
                <option value="2person">2 Person</option>
                <option value="3person">3 Person</option>
                <option value="4person">4 Person</option>
                <option value="5-8person">5-8 Person</option>
                <option value="9person">9+(private Event)</option>
            </select>
        </div>

        <div class="field-group guest">
            <label for="occassion">occassion</label>
            <select name="occassion" id="">
                <option value="regular-dinner">Regular Dinner</option>
                <option value="birthday">Birthday</option>
                <option value="anniversary">Anniversary</option>
                <option value="family-gathering">Family Gathering</option>
                <option value="business-lunch">Business Lunch</option>
            </select>
        </div>
        </div>

        <div class="field-group special">
            <label for="special">Special Request</label>
            <input type="text" name="special" id="">
        </div>

            <button type="submit">Confirm My Reservation</button>
        </div>
    </form>
</body>
</html>
